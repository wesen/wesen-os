apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wesen-os
  annotations:
    kubernetes.io/ingress.class: traefik
spec:
  rules:
    - host: wesen-os.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: wesen-os
                port:
                  name: http

