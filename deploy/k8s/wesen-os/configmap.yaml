apiVersion: v1
kind: ConfigMap
metadata:
  name: wesen-os-config
data:
  profiles.runtime.yaml: |
    slug: cluster-default
    display_name: Cluster Default
    profiles:
      default:
        slug: default
        display_name: Default
        description: Cluster default chat profile.
        inference_settings:
          chat:
            engine: gpt-4.1-mini
  federation.registry.json: |
    {
      "version": 1,
      "remotes": [
        {
          "remoteId": "inventory",
          "mode": "remote-manifest",
          "enabled": true,
          "manifestUrl": "https://scapegoat-federation-assets.fsn1.your-objectstorage.com/remotes/inventory/versions/sha-1a32286/mf-manifest.json"
        }
      ]
    }
