name: wesen-os-launcher-frontend-ci

on:
  push:
    branches:
      - main
      - task/**
  pull_request:

jobs:
  launcher-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout wesen-os
        uses: actions/checkout@v4

      - name: Checkout go-go-os-frontend
        uses: actions/checkout@v4
        with:
          repository: go-go-golems/go-go-os-frontend
          path: go-go-os-frontend

      - name: Checkout go-go-app-inventory repo
        uses: actions/checkout@v4
        with:
          repository: go-go-golems/go-go-app-inventory
          path: go-go-app-inventory

      - name: Checkout go-go-app-arc-agi-3 repo
        uses: actions/checkout@v4
        with:
          repository: go-go-golems/go-go-app-arc-agi-3
          path: go-go-app-arc-agi-3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: |
            pnpm-lock.yaml
            go-go-os-frontend/pnpm-lock.yaml

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install go-go-os-frontend dependencies
        run: pnpm -C go-go-os-frontend install --frozen-lockfile

      - name: Install wesen-os frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Run launcher frontend build
        run: pnpm run launcher:frontend:build

      - name: Run launcher frontend tests
        run: pnpm run test
