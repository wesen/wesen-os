name: publish-host-image

on:
  pull_request:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/publish-host-image.yml'
      - 'Dockerfile'
      - '.dockerignore'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'go.mod'
      - 'go.sum'
      - 'go.work'
      - 'go.work.sum'
      - '.gitmodules'
      - 'cmd/wesen-os-launcher/**'
      - 'pkg/launcherui/**'
      - 'pkg/assistantbackendmodule/**'
      - 'pkg/arcagi/**'
      - 'pkg/gepa/**'
      - 'pkg/sqlite/**'
      - 'apps/os-launcher/**'
      - 'deploy/gitops-targets.json'
      - 'scripts/build-wesen-os-launcher.sh'
      - 'scripts/launcher-ui-sync.sh'
      - 'scripts/open_gitops_pr.py'
      - 'workspace-links/**'
  workflow_dispatch:
    inputs:
      push_image:
        description: Push the built image to GHCR
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  packages: write
  pull-requests: write

concurrency:
  group: publish-host-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build launcher binary
        run: npm run launcher:binary:build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=main,enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=wesen-os
            org.opencontainers.image.description=wesen-os launcher host
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Log in to GHCR
        if: github.event_name != 'pull_request' && (github.event_name == 'push' || inputs.push_image == true)
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' && (github.event_name == 'push' || inputs.push_image == true) }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summarize published image refs
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "push_enabled=false"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.push_image }}" != "true" ]; then
            echo "push_enabled=false"
          else
            echo "push_enabled=true"
          fi
          echo "tags<<EOF" >> "$GITHUB_STEP_SUMMARY"
          printf '%s\n' "${{ steps.meta.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
          echo "EOF" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "digest: \`${{ steps.build.outputs.digest }}\`" >> "$GITHUB_STEP_SUMMARY"

  gitops-pr:
    name: Open GitOps PR
    needs: docker
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main' && (github.event_name == 'push' || inputs.push_image == true)
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Open GitOps pull requests for published image
        env:
          GH_TOKEN: ${{ secrets.GITOPS_PR_TOKEN }}
          GITOPS_PR_GIT_AUTHOR_NAME: github-actions[bot]
          GITOPS_PR_GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          if [ -z "${GH_TOKEN}" ]; then
            echo "GITOPS_PR_TOKEN is not configured; skipping GitOps PR creation."
            exit 0
          fi
          image_tag="sha-${GITHUB_SHA::7}"
          python3 scripts/open_gitops_pr.py \
            --config deploy/gitops-targets.json \
            --all-targets \
            --image "ghcr.io/${{ github.repository }}:${image_tag}" \
            --push \
            --open-pr
