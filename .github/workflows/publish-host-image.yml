name: publish-host-image

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/publish-host-image.yml'
      - 'Dockerfile'
      - '.dockerignore'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'go.mod'
      - 'go.sum'
      - 'go.work'
      - 'go.work.sum'
      - '.gitmodules'
      - 'cmd/wesen-os-launcher/**'
      - 'pkg/launcherui/**'
      - 'pkg/assistantbackendmodule/**'
      - 'pkg/arcagi/**'
      - 'pkg/gepa/**'
      - 'pkg/sqlite/**'
      - 'apps/os-launcher/**'
      - 'scripts/build-wesen-os-launcher.sh'
      - 'scripts/launcher-ui-sync.sh'
      - 'workspace-links/**'
  workflow_dispatch:
    inputs:
      push_image:
        description: Push the built image to GHCR
        required: true
        default: false
        type: boolean

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      SHOULD_PUSH: ${{ github.event_name == 'push' || inputs.push_image == true }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build launcher binary
        run: npm run launcher:binary:build

      - name: Log in to GHCR
        if: env.SHOULD_PUSH == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=main,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=wesen-os

      - name: Build and optionally push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ env.SHOULD_PUSH == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summarize published image refs
        run: |
          echo "push_enabled=${SHOULD_PUSH}"
          echo "tags<<EOF" >> "$GITHUB_STEP_SUMMARY"
          printf '%s\n' "${{ steps.meta.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
          echo "EOF" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "digest: \`${{ steps.build.outputs.digest }}\`" >> "$GITHUB_STEP_SUMMARY"
